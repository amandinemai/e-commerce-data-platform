version: 2

models:
  - name: stg_orders
    description: "Cleaned and typed orders from raw source"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Reference to the customer"
        tests:
          - not_null
      - name: product_id
        description: "Reference to the product"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null
          - accepted_values:
              name: accepted_values_order_status
              values: ['completed', 'shipped', 'cancelled', 'pending']
      - name: total_amount
        description: "Total order amount in euros"
        tests:
          - not_null
      - name: order_date
        description: "Date the order was placed"
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned and typed customers from raw source"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
      - name: email
        description: "Customer email address"
        tests:
          - unique
          - not_null
      - name: country
        description: "Customer country"
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned and typed products from raw source"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null
      - name: price
        description: "Product price in euros"
        tests:
          - not_null